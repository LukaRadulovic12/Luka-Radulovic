<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <h1>IGRA VESALA - JAVASCRIPT BIRA RECI VI POGADJATE</h1>
    <img
      src="./ASSETS/IMAGES/360_F_644860702_GeM8ZIG0C1rf01Zha77QV6dU2HuYiFsl.jpg"
      alt=""
    />
    <h1>IGRAJTE IGRU VESALA SINGLEPLAYER</h1>
    <button id="buttonZapocniIgru">ZAPOCNI IGRU</button>
    <h2>POKUSAJI</h2>
    <h2 id="brojPokusajaIspis"></h2>
    <div class="input-group input-group-lg">
      <span class="input-group-text" id="inputGroup-sizing-lg">UNOS SLOVA</span>
      <input
        id="unosSlova"
        type="text"
        class="form-control"
        aria-label="Sizing example input"
        aria-describedby="inputGroup-sizing-lg"
      />
    </div>
    <button id="buttonUnosSlova">UNOS SLOVA</button>
    <div class="input-group input-group-lg">
      <span class="input-group-text" id="inputGroup-sizing-lg" id
        >UNOS RESENJA</span
      >
      <input
        id="unosResenja"
        type="text"
        class="form-control"
        aria-label="Sizing example input"
        aria-describedby="inputGroup-sizing-lg"
      />
    </div>
    <button id="buttonUnosResenja">UNOS RESENJA</button>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
